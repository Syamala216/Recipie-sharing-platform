<!DOCTYPE html>
<html>
<head>
<title>FoodApp</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f9fa; }

.navbar { background:#ff4d4d; }

.hero {
    background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
    background-size:cover;
    height:300px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

.card:hover {
    transform:scale(1.03);
    transition:0.3s;
}

.rating {
    background:green;
    color:white;
    padding:3px 8px;
    border-radius:5px;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">
    <a class="navbar-brand fw-bold" href="/">🍽 FoodApp</a>
</div>
</nav>

<div class="hero">
    <h2>Discover Best Food</h2>

    <form method="GET" class="d-flex mt-3">
        <input class="form-control me-2" name="q" placeholder="Search recipes">
        <button class="btn btn-light">Search</button>
    </form>
</div>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

<!-- Floating Add Button -->
<a href="/add/" style="
position:fixed;
bottom:20px;
right:20px;
background:#ff4d4d;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;">+</a>

</body>
</html>
